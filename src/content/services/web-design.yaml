faqs:
  - question: "How much does custom web design cost in Ottawa?"
    answer: "Custom web design starts at $1,499. Most projects range from $3,499 to $6,999 depending on complexity and features."
  - question: "How long does a custom website take to build?"
    answer: "Most custom websites are completed within 2-4 weeks. Complex projects may take 4-6 weeks."
  - question: "What's included in custom web design?"
    answer: "Every project includes discovery, custom wireframes, high-fidelity mockups, responsive development, SEO optimization, and post-launch support."
  - question: "Can I see designs before development starts?"
    answer: "Absolutely. We create detailed mockups for your approval before writing any code."
  - question: "Do you redesign existing websites?"
    answer: "Yes! We regularly redesign outdated websites while preserving SEO equity."
