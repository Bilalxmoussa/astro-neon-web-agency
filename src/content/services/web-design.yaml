sections:
  - heading: "Why Custom Web Design Matters for Ottawa Businesses"
    content:
      - "In a market with thousands of businesses competing online, a template website simply won't cut it. Custom web design gives your Ottawa business a unique identity that stands out from competitors using the same cookie-cutter themes."
      - "Our custom design process starts with understanding your business goals, target audience, and competitive landscape in Ottawa. The result is a website that not only looks stunning but is engineered to drive measurable business results."
