faqs:
  - question: "How much does an e-commerce website cost in Ottawa?"
    answer: "Basic online stores start at $3,499. Feature-rich e-commerce platforms with custom functionality typically range from $5,999 to $12,999 depending on product count and integrations needed."
  - question: "Which e-commerce platform do you recommend?"
    answer: "Shopify for most Ottawa businesses due to reliability and ease of use. WooCommerce for deep customization needs. Custom headless builds for high-traffic stores requiring maximum performance."
  - question: "Can you migrate my existing online store?"
    answer: "Yes! We handle migrations from Shopify, WooCommerce, Magento, Squarespace, and Wix — transferring products, customer data, and order history with minimal downtime."
  - question: "How do you handle Canadian tax calculations?"
    answer: "Our e-commerce solutions include automated tax calculation for all provinces and territories including GST, HST, PST, and QST."
  - question: "Do you provide ongoing e-commerce support?"
    answer: "Yes, we offer maintenance packages including security updates, product management assistance, performance optimization, and priority support."
