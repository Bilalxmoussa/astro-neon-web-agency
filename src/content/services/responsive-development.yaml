faqs:
  - question: "How much does responsive web development cost?"
    answer: "All our websites are responsive by default — it's built into every project. Standalone responsive redesigns of existing sites start at $2,499 depending on the site's complexity."
  - question: "Will my existing website work on mobile?"
    answer: "We can audit your current site and either make it responsive or recommend a rebuild. Often a responsive redesign is more cost-effective than retrofitting an old non-responsive site."
  - question: "How do you test responsive designs?"
    answer: "We test on real devices (iPhone, Android, iPad, various screen sizes), browser emulators, and automated testing tools. Every page is verified across at least 10 device/browser combinations before launch."
  - question: "Does responsive design affect SEO?"
    answer: "Absolutely. Google uses mobile-first indexing, so your mobile experience directly impacts search rankings. Responsive websites consistently rank higher than non-responsive alternatives."
  - question: "What about tablets and larger screens?"
    answer: "Our responsive approach covers all screen sizes — smartphones, tablets, laptops, desktops, and even large monitors. Content reflows intelligently at every breakpoint."
