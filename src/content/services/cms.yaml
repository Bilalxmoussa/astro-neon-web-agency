faqs:
  - question: "Which CMS platform should I choose?"
    answer: "It depends on your needs. WordPress is best for content-heavy sites with blogs and service pages. Shopify excels for e-commerce. Headless CMS solutions are ideal for high-performance sites needing maximum speed. We'll recommend the right platform during our consultation."
  - question: "Can I really update the website myself?"
    answer: "Absolutely. We build intuitive editing interfaces and provide thorough training. Most clients are confidently making updates within their first week. We also provide documentation and ongoing support for questions."
  - question: "How much does a CMS website cost in Ottawa?"
    answer: "CMS websites start at $2,499 for a standard WordPress site. Custom CMS builds with advanced features typically range from $4,999 to $9,999. We provide detailed quotes based on your specific requirements."
  - question: "Is WordPress secure?"
    answer: "Yes, when properly maintained. We implement security best practices including hardened configurations, security plugins, regular updates, and SSL encryption. Our maintenance plans keep your WordPress site secure ongoing."
  - question: "Can you migrate my content from another platform?"
    answer: "Yes! We handle migrations from Wix, Squarespace, Joomla, Drupal, and other platforms. We transfer all content, maintain URL structures where possible, and set up proper redirects to preserve your SEO equity."
