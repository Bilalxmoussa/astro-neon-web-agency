faqs:
  - question: "How much does a landing page cost in Ottawa?"
    answer: "Single landing pages start at $999. Campaign packages with multiple landing page variants for A/B testing typically range from $1,999 to $3,999. Volume discounts are available for ongoing campaign work."
  - question: "How long does it take to build a landing page?"
    answer: "Most landing pages are delivered within 5-7 business days. Rush delivery (2-3 days) is available for time-sensitive campaigns at an additional fee."
  - question: "Do you handle A/B testing?"
    answer: "Yes! We set up A/B tests comparing different headlines, layouts, CTAs, and form designs. We monitor results and implement the winning variations to continuously improve conversion rates."
  - question: "Can you track conversions from my ads?"
    answer: "Absolutely. We implement Google Ads conversion tracking, Facebook Pixel, LinkedIn Insight Tag, and Google Analytics goals on every landing page so you can see exactly which campaigns are driving results."
  - question: "Do you also manage ad campaigns?"
    answer: "Our primary focus is building high-converting landing pages, but we can recommend trusted Google Ads and social media advertising partners in Ottawa for campaign management."
