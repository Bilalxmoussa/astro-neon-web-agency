faqs:
  - question: "How much does website maintenance cost in Ottawa?"
    answer: "Our maintenance plans start at $99/month for basic security and backup coverage. Comprehensive plans with content updates, SEO monitoring, and priority support range from $199-$499/month depending on your website's complexity and needs."
  - question: "What happens if my website goes down?"
    answer: "Our uptime monitoring detects issues within minutes. Our team responds immediately to diagnose and resolve the problem, typically restoring service within 1-2 hours. Critical issues receive emergency priority regardless of your plan level."
  - question: "Can you maintain a website built by another agency?"
    answer: "Yes! We maintain websites built on all major platforms including WordPress, Shopify, Squarespace, and custom-built sites. We'll start with a thorough audit to understand your site's architecture and any existing issues."
  - question: "How often do you update plugins and software?"
    answer: "We perform security updates within 24-48 hours of release. Feature updates and major version upgrades are tested in a staging environment first to ensure compatibility before being applied to your live site."
  - question: "Do you offer emergency support?"
    answer: "Yes, all maintenance clients receive priority support. Emergency issues (site down, security breach) receive immediate attention regardless of business hours."
