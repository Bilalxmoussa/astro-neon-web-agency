faqs:
  - question: "How much does a dental website cost in Ottawa?"
    answer: "Our dental website packages start at $2,499 for a professional site with service pages and contact forms. Websites with online booking integration and patient portals typically range from $3,999 to $7,999. Every package includes local SEO optimization."
  - question: "Can patients book appointments directly through the website?"
    answer: "Yes! We integrate with popular dental practice management systems to provide seamless online booking. Patients can see available time slots and book appointments 24/7, which significantly reduces phone call volume and increases booking rates."
  - question: "Is the website HIPAA and AODA compliant?"
    answer: "All our dental websites are built to meet Ontario's AODA accessibility standards and follow healthcare privacy best practices. While HIPAA is a US regulation, we apply similar privacy principles for Canadian dental practices and ensure patient data is handled securely."
  - question: "How do you help my dental practice rank on Google?"
    answer: "We implement a comprehensive local SEO strategy including Google Business Profile optimization, dental-specific schema markup, targeted service pages, citation building, and content strategy. Most of our dental clients see significant ranking improvements within 3-6 months."
  - question: "Can I update the website content myself?"
    answer: "Absolutely. We build dental websites on user-friendly platforms that let you add blog posts, update service descriptions, change team bios, and manage your appointment calendar without any coding knowledge."
