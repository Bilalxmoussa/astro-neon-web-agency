faqs:
  - question: "How much does a real estate website cost in Ottawa?"
    answer: "Real estate website packages start at $2,999 for a professional site with IDX integration and lead capture. Custom websites with CRM integration, neighborhood guides, and advanced features typically range from $4,999 to $9,999."
  - question: "Can you integrate with MLS/IDX?"
    answer: "Yes! We integrate with major IDX providers to display live MLS listings directly on your website. Visitors can search, filter, and save listings without leaving your site, and you capture their contact information."
  - question: "Do you build websites for individual agents or brokerages?"
    answer: "Both! We create websites for individual real estate agents, teams, and brokerages. Each solution is tailored to your specific needs, market area, and business goals."
  - question: "Can I add my own listings and content?"
    answer: "Absolutely. MLS listings update automatically through IDX integration, and you can easily add exclusive listings, blog posts, market updates, and neighborhood content through the user-friendly CMS."
  - question: "How do you help me rank for real estate searches in Ottawa?"
    answer: "We create neighborhood-specific community pages, optimize for high-value real estate keywords, build local citations, and implement a content strategy focused on Ottawa's real estate market. Most clients see significant ranking improvements within 4-6 months."
