faqs:
  - question: "How much does a law firm website cost in Ottawa?"
    answer: "Our law firm website packages start at $3,499 for a professional site with practice area pages and contact forms. Comprehensive websites with client portals, intake forms, and extensive content typically range from $5,999 to $9,999."
  - question: "Do you understand Law Society of Ontario marketing rules?"
    answer: "Yes. We're experienced in building law firm websites that comply with the Law Society of Ontario's marketing guidelines, including rules around testimonials, advertising claims, and mandatory disclosures."
  - question: "Can you help our firm rank for competitive legal keywords?"
    answer: "Absolutely. Legal SEO is competitive, but our targeted approach — combining practice area content, local SEO, and authority building — consistently achieves first-page rankings for Ottawa law firms within 4-6 months."
  - question: "How long does it take to build a law firm website?"
    answer: "Most law firm websites take 3-4 weeks to complete. Larger firms with multiple practice areas, extensive attorney profiles, and custom features may take 5-6 weeks."
  - question: "Will the website generate leads for our practice?"
    answer: "Yes. Every law firm website we build is designed for lead generation, with strategic CTAs, consultation booking, intake forms, and content that addresses the specific legal needs of Ottawa residents. Our law firm clients typically see consultation requests double within 90 days of launch."
