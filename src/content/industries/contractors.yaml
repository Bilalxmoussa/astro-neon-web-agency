faqs:
  - question: "How much does a contractor website cost in Ottawa?"
    answer: "Our contractor website packages start at $1,499 for a professional site with service pages and contact forms. Comprehensive websites with booking systems, service area pages, and portfolio galleries typically range from $2,999 to $5,999."
  - question: "Can customers request quotes through the website?"
    answer: "Yes! Every contractor website includes custom quote request forms that capture project details, photos, budget range, and contact information. You receive notifications instantly via email and can respond quickly to win the job."
  - question: "Do you build websites for specific trades?"
    answer: "Absolutely. We've built websites for plumbers, electricians, roofers, HVAC technicians, landscapers, painters, general contractors, handymen, and more. Each website is tailored to the specific needs of your trade and target customer."
  - question: "How do you help my contracting business rank on Google?"
    answer: "We implement targeted local SEO including Google Business Profile optimization, service area pages, trade-specific schema markup, review strategy, and local content. Most contractor clients see significant ranking improvements within 3-4 months."
  - question: "Can I update the website myself?"
    answer: "Yes! We build contractor websites with easy-to-use content management systems. Add new project photos, update service offerings, and manage your portfolio without any coding knowledge. We also provide training."
