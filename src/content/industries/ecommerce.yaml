faqs:
  - question: "How much does an e-commerce website cost in Ottawa?"
    answer: "<a href=\"/blog/web-design-cost-ottawa/\">E-commerce website pricing</a> depends on the number of products, features, and complexity. Basic online stores start at $3,499, while feature-rich e-commerce platforms with custom functionality typically range from $5,999 to $12,999."
  - question: "Which e-commerce platform do you recommend?"
    answer: "We recommend Shopify for most Ottawa businesses due to its reliability, Canadian payment support, and ease of use. For businesses needing more customization, we build with WooCommerce (WordPress) or custom Next.js e-commerce solutions."
  - question: "Can you migrate my existing online store?"
    answer: "Yes! We handle migrations from any platform including Shopify, WooCommerce, Magento, Squarespace, and Wix. We transfer products, customer data, and order history while minimizing downtime."
  - question: "How do you handle Canadian tax calculations?"
    answer: "Our e-commerce solutions include automated tax calculation for all Canadian provinces and territories, including GST, HST, PST, and QST. We configure tax settings based on your business location and where you ship."
  - question: "Do you provide ongoing e-commerce support?"
    answer: "Yes! We offer ongoing maintenance and support packages that include security updates, product management assistance, performance optimization, and priority support for any issues."
