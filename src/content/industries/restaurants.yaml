faqs:
  - question: "How much does a restaurant website cost in Ottawa?"
    answer: "Our restaurant website packages start at $1,499 for a professional site with menu display and contact information. Websites with online ordering integration and reservation systems typically range from $3,499 to $6,999 depending on complexity and features needed."
  - question: "Can you integrate online ordering into my restaurant website?"
    answer: "Yes! We integrate with popular platforms like Square Online, Toast, and custom ordering solutions. Direct online ordering through your website eliminates the 25-30% commissions charged by third-party delivery apps, putting more profit in your pocket."
  - question: "How long does it take to build a restaurant website?"
    answer: "Most restaurant websites are completed within 2-3 weeks. If you need online ordering or reservation system integration, the timeline may extend to 3-4 weeks to ensure everything works perfectly."
  - question: "Will my restaurant website show up on Google?"
    answer: "Absolutely. Every restaurant website we build includes local SEO optimization targeting Ottawa-specific searches. We also set up and optimize your Google Business Profile to improve visibility in Google Maps and local search results."
  - question: "Can I update my menu myself?"
    answer: "Yes! We build restaurant websites with easy-to-use content management systems that let you update menus, prices, specials, and hours anytime without any technical knowledge. We also provide training to make sure you're comfortable making changes."
