faqs:
  - question: "How much does a salon website cost in Ottawa?"
    answer: "Our salon and spa website packages start at $1,799 for a professional site with service menus, staff profiles, gallery, and contact forms. Websites with integrated online booking, gift card e-commerce, product retail, and advanced portfolio features typically range from $3,499 to $7,499 depending on the scope and integrations required."
  - question: "Can clients book appointments directly through the website?"
    answer: "Yes! We integrate with popular salon booking platforms including Vagaro, Fresha, Square Appointments, and Boulevard. Clients can browse your services, select their preferred stylist, choose a date and time, and confirm their appointment entirely online — 24/7. This dramatically reduces phone call volume and captures bookings outside of business hours."
  - question: "Can I sell gift cards and products through my website?"
    answer: "Absolutely. We set up e-gift card systems where customers can purchase, personalize, and send digital gift cards instantly. We also build product retail sections for selling your professional hair care and skincare lines online, complete with inventory tracking, shipping options, and secure checkout."
  - question: "How do you help my salon rank on Google?"
    answer: "We implement a beauty-industry-specific local SEO strategy that includes Google Business Profile optimization, salon directory citations, schema markup for services and reviews, image SEO for your portfolio, and content targeting searches like 'hair salon near me' and specific service terms. Most of our salon clients see significant ranking improvements within 3-5 months."
  - question: "Can I update the website content myself?"
    answer: "Yes. Every salon website we build comes with an easy-to-use content management system that lets you upload new portfolio photos, update service prices, add staff members, publish blog posts, and manage your product inventory without any technical skills. We also provide hands-on training so your front desk team can keep the website current."
