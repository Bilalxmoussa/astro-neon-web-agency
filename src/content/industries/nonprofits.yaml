faqs:
  - question: "How much does a nonprofit website cost in Ottawa?"
    answer: "We offer special nonprofit pricing starting at $1,499 for a professional website with donation forms, event pages, and contact information. Full-featured nonprofit websites with integrated donation processing, volunteer portals, event management, and impact storytelling sections typically range from $2,999 to $6,499. We also offer flexible payment plans for organizations with budget constraints."
  - question: "Can donors make recurring monthly donations through the website?"
    answer: "Yes! We integrate secure recurring donation functionality through platforms like Stripe and Canada Helps. Donors can set up automatic monthly, quarterly, or annual gifts, and manage their giving preferences through a self-service portal. Recurring donation programs are the most reliable revenue stream for nonprofits, and we design the experience to maximize recurring gift signups."
  - question: "Is the website AODA accessible and compliant?"
    answer: "All our nonprofit websites are built to meet WCAG 2.1 AA standards, which satisfies Ontario's AODA requirements. This includes proper heading structure, alt text for images, keyboard navigation, sufficient colour contrast, screen reader compatibility, and accessible forms. We also provide an accessibility statement page and conduct testing with assistive technologies."
  - question: "How do you help my nonprofit rank on Google?"
    answer: "We implement a nonprofit-focused local SEO strategy that includes Google Business Profile optimization, charity directory citations, nonprofit schema markup, and a content strategy built around your mission and programs. We also help eligible organizations apply for Google Ad Grants, which provides up to $10,000/month in free Google Ads to drive traffic to your website."
  - question: "Can I update the website content myself?"
    answer: "Absolutely. We build every nonprofit website on an intuitive content management system that lets your staff add events, publish blog posts, update program information, and manage volunteer listings without any coding knowledge. This is especially important for nonprofits that need to keep content fresh with limited technical resources. We provide training for your team and ongoing support."
