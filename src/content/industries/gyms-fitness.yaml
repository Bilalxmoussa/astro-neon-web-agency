faqs:
  - question: "How much does a gym website cost in Ottawa?"
    answer: "Our gym and fitness website packages start at $1,999 for a professional site with class schedules, trainer profiles, and contact forms. Websites with integrated booking systems, membership signup portals, and virtual workout sections typically range from $3,999 to $8,499 depending on complexity and integrations required."
  - question: "Can you integrate my gym management software with the website?"
    answer: "Yes! We integrate with popular gym management platforms including Mindbody, Glofox, Zen Planner, and Wodify. This enables real-time class schedules, online booking, membership management, and automated communications — all synced between your website and your backend system."
  - question: "Do you build websites for small personal training studios?"
    answer: "Absolutely. We work with gyms of all sizes, from large multi-location facilities to solo personal trainers and boutique fitness studios. Our packages scale to fit your business, whether you need a simple one-page site with a booking form or a full-featured platform with class schedules, video content, and e-commerce."
  - question: "How do you help my gym rank on Google?"
    answer: "We implement a comprehensive local SEO strategy tailored to the fitness industry. This includes optimizing your Google Business Profile, building fitness-specific citations, implementing gym schema markup, creating targeted content for searches like 'gym near me' and 'fitness classes Ottawa,' and building local links. Most of our gym clients see first-page rankings within 3-6 months."
  - question: "Can I update the website content myself?"
    answer: "Yes. We build every gym website on a user-friendly content management system that lets you update class schedules, add new trainer profiles, publish blog posts, change pricing, and upload photos without any coding knowledge. We also provide training and documentation so your team feels confident managing the site."
