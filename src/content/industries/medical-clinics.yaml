faqs:
  - question: "How much does a medical clinic website cost in Ottawa?"
    answer: "Our medical clinic website packages start at $2,499 for a professional site with physician profiles, service pages, and contact forms. Websites with online appointment booking, patient portal integration, health resource libraries, and multilingual support typically range from $4,999 to $9,999 depending on the complexity of EMR integrations, the number of providers, and the scope of the project."
  - question: "Can patients book appointments online through the website?"
    answer: "Yes! We integrate with leading healthcare scheduling platforms and EMR systems to provide seamless online booking. Patients can select their physician, choose a visit type (in-person, phone, or virtual), pick from available time slots, and receive automated confirmation and reminder messages. This significantly reduces phone call volume and allows patients to book outside office hours."
  - question: "Is the website AODA compliant and accessible?"
    answer: "All our medical clinic websites are built to meet WCAG 2.1 AA accessibility standards, satisfying Ontario's AODA requirements for healthcare organizations. This includes proper heading hierarchy, alt text for all images, keyboard navigation, sufficient colour contrast, screen reader compatibility, accessible forms, and clear content structure. We also conduct accessibility audits using assistive technology testing."
  - question: "How do you help my clinic rank on Google?"
    answer: "We implement a healthcare-focused local SEO strategy that includes Google Business Profile optimization, medical directory citations on RateMDs and Healthgrades, physician schema markup, targeted service pages for each practice area, and a health content strategy. We optimize for searches like 'walk-in clinic near me,' 'family doctor Ottawa,' and specific medical service terms. Most of our healthcare clients see strong ranking improvements within 3-6 months."
  - question: "Can I update the website content myself?"
    answer: "Absolutely. Every medical clinic website we build comes with a user-friendly content management system that allows your administrative staff to update physician profiles, publish health articles, change office hours, add new services, and manage your resource library without any coding knowledge. We provide thorough training and ongoing support so your team can keep the website current and accurate."
