faqs:
  - question: "How much does a bilingual website cost for a Gatineau business?"
    answer: "Bilingual website costs for Gatineau businesses typically range from $5,000 to $18,000+ depending on the project scope. A standard bilingual business website with 5-8 pages in both French and English starts at $5,000-$8,000. Larger projects with e-commerce, online booking, or custom functionality range from $8,000-$15,000. Complex bilingual projects with extensive content can be $15,000-$18,000+. The premium over a single-language site typically ranges from 30-50% to cover translation, bilingual SEO, and additional development work."
  - question: "Do you comply with Quebec language laws for Gatineau websites?"
    answer: "Yes, we build all Gatineau websites in compliance with Quebec's language laws, including Bill 96 requirements. This means French is the default language of your website, French content is at least as prominent as English content, and all required elements are presented in French first. We ensure your website meets these legal requirements while still effectively serving your English-speaking customers across the National Capital Region."
  - question: "Can you help my Gatineau business reach Ottawa customers?"
    answer: "Absolutely — this is one of our core specialties. We build bilingual websites optimized for search engines in both French and English, with targeted SEO strategies for both the Gatineau and Ottawa markets. This includes English-language content optimized for Ottawa search terms, Ottawa-area citation building, and cross-border Google Business Profile optimization. Our Gatineau clients consistently attract significant traffic from Ottawa-based customers."
  - question: "How do you handle translation for Gatineau websites?"
    answer: "We work with professional translators who specialize in Quebec French — not Parisian French or machine translation. This ensures your French content reads naturally to Gatineau residents and uses the correct terminology, idioms, and cultural references. For English content, we create original copy rather than simply translating from French, ensuring both language versions are compelling and SEO-optimized independently."
  - question: "What industries do you serve in Gatineau?"
    answer: "We serve all industries in Gatineau, including restaurants and hospitality, professional services (law, accounting, consulting), healthcare (dental, medical, wellness), retail and e-commerce, real estate, construction and trades, and technology companies. Each industry has specific web design and SEO requirements, and our experience across these sectors allows us to deliver websites that are tailored to your specific market and customer base."
