faqs:
  - question: "Do you build bilingual websites for Orleans businesses?"
    answer: "Yes, bilingual website design is one of our core specialties. We build fully bilingual English/French websites with seamless language switching, proper hreflang tags for SEO in both languages, and culturally appropriate content for both audiences. Our bilingual sites are not simple machine translations — we work with professional translators to ensure your French content is natural, accurate, and engaging."
  - question: "How much does web design cost for an Orleans business?"
    answer: "Web design costs for Orleans businesses typically range from $3,500 to $15,000+ depending on the scope. Bilingual websites generally cost 30-50% more than single-language sites due to the additional content, design, and SEO work involved. A standard bilingual business website ranges from $5,000-$10,000, while complex e-commerce or custom projects can be $10,000-$15,000+. We provide transparent quotes after our free consultation."
  - question: "How do you handle SEO for both English and French?"
    answer: "We implement a comprehensive bilingual SEO strategy that includes separate keyword research for English and French search terms, properly structured bilingual pages with hreflang tags, French-language Google Business Profile optimization, and bilingual citation building. This ensures your Orleans business ranks well in both English and French search results, maximizing your visibility to the entire community."
  - question: "Can you redesign my existing Orleans business website?"
    answer: "Absolutely. We regularly redesign websites for Orleans businesses that need a modern, mobile-friendly, SEO-optimized upgrade. Our redesign process includes a full audit of your existing site, preservation of any SEO equity you have built, proper URL redirects, and a seamless transition that minimizes disruption to your online presence. Many Orleans businesses see an immediate increase in traffic and leads after a redesign."
  - question: "How long does it take to build a bilingual website?"
    answer: "Bilingual websites for Orleans businesses typically take 6-10 weeks to complete, which is slightly longer than single-language projects due to the additional content creation, translation, and bilingual SEO work involved. Simple bilingual sites can be completed in 5-6 weeks, while complex projects may take 10-12 weeks. We provide a detailed timeline during our discovery phase."
