faqs:
  - question: "How much does a website cost for a Barrhaven small business?"
    answer: "Website costs for Barrhaven small businesses typically range from $3,000 to $12,000 depending on the scope and features. A simple 5-page brochure website starts around $3,000-$5,000, while a full-featured site with online booking, e-commerce, or custom functionality ranges from $6,000-$12,000+. We offer flexible payment plans and provide a detailed quote after our free consultation."
  - question: "How quickly can you build a website for my Barrhaven business?"
    answer: "Most Barrhaven business websites are completed within 4-6 weeks. Simple sites can be delivered in as few as 3 weeks, while larger projects with e-commerce or custom features may take 6-10 weeks. We always provide a clear timeline during our discovery phase and keep you informed at every stage of the process."
  - question: "Will my website rank on Google for Barrhaven searches?"
    answer: "Every website we build includes foundational local SEO optimization specifically targeting Barrhaven search terms. This includes on-page keyword optimization, schema markup, meta tag optimization, and technical SEO best practices. For businesses that want to aggressively pursue top rankings, we offer monthly SEO packages that include content creation, link building, and ongoing optimization."
  - question: "Do you work with new businesses in Barrhaven?"
    answer: "Absolutely. We love working with new Barrhaven businesses and startups. We understand the unique challenges of launching a new business — tight budgets, the need to build credibility quickly, and the urgency of getting found online. We offer startup-friendly packages and can help you establish a professional online presence from day one."
  - question: "Can you add online ordering to my Barrhaven restaurant website?"
    answer: "Yes, we specialize in restaurant websites with integrated online ordering systems. We can set up commission-free ordering directly on your website, integrate with delivery platforms, and create mobile-optimized menus that make it easy for Barrhaven residents to order from your restaurant. Direct online ordering eliminates the 25-30% commissions charged by third-party apps."
