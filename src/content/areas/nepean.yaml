faqs:
  - question: "How much does web design cost for Nepean businesses?"
    answer: "Web design for Nepean businesses typically ranges from $3,000 to $15,000+ depending on the project scope. A clean, professional 5-7 page business website starts at $3,000-$5,000. Websites with custom features like online booking, e-commerce, or portfolio galleries range from $6,000-$12,000. Complex projects with multiple integrations can be $12,000-$15,000+. We provide transparent, itemized quotes after understanding your specific needs."
  - question: "Do you specialize in any particular types of Nepean businesses?"
    answer: "We work with all types of Nepean businesses, but we have particular expertise with professional services (law firms, accountants, consultants), healthcare providers (dental clinics, physiotherapy, optometry), restaurants and hospitality, retail and e-commerce, and home service contractors. Our experience across these sectors means we understand the specific features, content strategies, and SEO approaches that work best for each."
  - question: "Can you help my Nepean business rank on Google Maps?"
    answer: "Yes, Google Maps and Local Pack optimization is a key component of our local SEO services. We optimize your Google Business Profile with accurate business information, relevant categories, compelling descriptions, and high-quality photos. We also implement a review generation strategy, build local citations, and optimize your website with LocalBusiness schema markup — all of which contribute to higher rankings in Google Maps and the Local Pack."
  - question: "How do you handle website redesigns for established Nepean businesses?"
    answer: "We take a careful, strategic approach to redesigns for established Nepean businesses. We begin with a thorough audit of your existing website to identify what is working (pages with good rankings, high-traffic content) and what needs improvement. We preserve your SEO equity through proper 301 redirects, maintain your existing content structure where it is performing well, and improve everything else. The goal is a dramatic upgrade in design and performance without losing any ground in search rankings."
  - question: "What makes your agency different from other Nepean web designers?"
    answer: "Three things set us apart: local expertise, technical depth, and accountability. We know the Nepean market — its demographics, its business districts, and its search patterns. We build websites using modern, performance-first technology that outperforms template-based solutions. And we provide transparent monthly reporting that shows exactly how your website is performing, so you always know the ROI of your investment."
